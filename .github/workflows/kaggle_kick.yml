name: Kaggle Kick

on:
  workflow_dispatch:
    inputs:
      today_jst:
        description: "翌営業日判定の JST 日付を上書きする (YYYY-MM-DD)"
        required: false
        type: string
      train_preset:
        description: "Kaggle 上で使う train_prob_model preset"
        required: false
        default: fast
        type: choice
        options:
          - default
          - fast
          - smoke
  schedule:
    - cron: "10 0 * * 1-5"

jobs:
  config-and-targets:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      kernel_id: ${{ steps.check.outputs.kernel_id }}
      train_preset: ${{ steps.inputs.outputs.train_preset }}
      targets_csv: ${{ steps.targets.outputs.targets_csv }}
      targets_count: ${{ steps.targets.outputs.targets_count }}
      has_targets: ${{ steps.targets.outputs.has_targets }}
      today_jst: ${{ steps.targets.outputs.today_jst }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: inputs
        shell: bash
        run: |
          train_preset="${{ github.event.inputs.train_preset }}"
          if [[ -z "$train_preset" ]]; then
            train_preset="fast"
          fi
          echo "train_preset=$train_preset" >> "$GITHUB_OUTPUT"

      - id: check
        env:
          KAGGLE_JSON: ${{ secrets.KAGGLE_JSON }}
          KAGGLE_KERNEL_ID: ${{ vars.KAGGLE_KERNEL_ID }}
        shell: bash
        run: |
          echo "kernel_id=$KAGGLE_KERNEL_ID" >> "$GITHUB_OUTPUT"
          if [[ -n "$KAGGLE_JSON" && -n "$KAGGLE_KERNEL_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Kaggle secrets/vars detected."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Kaggle secrets/vars are missing. Workflow will skip the kick job and succeed."
          fi

      - id: targets
        shell: bash
        run: |
          today_arg=()
          if [[ -n "${{ github.event.inputs.today_jst }}" ]]; then
            today_arg=(--today "${{ github.event.inputs.today_jst }}")
          fi

          python scripts/compute_kick_targets.py "${today_arg[@]}" --output "$RUNNER_TEMP/kick_targets.json"

          python - "$RUNNER_TEMP/kick_targets.json" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          with open(path, encoding="utf-8") as handle:
              payload = json.load(handle)

          targets = payload.get("targets", [])
          print(f"today_jst={payload['today']}")
          print(f"targets={targets}")

          with open("targets_output.txt", "w", encoding="utf-8") as out:
              out.write(f"today_jst={payload['today']}\n")
              out.write(f"targets_csv={','.join(targets)}\n")
              out.write(f"targets_count={len(targets)}\n")
              out.write(f"has_targets={'true' if targets else 'false'}\n")
          PY

          cat targets_output.txt >> "$GITHUB_OUTPUT"

  kaggle-kick:
    needs: config-and-targets
    if: needs.config-and-targets.outputs.ready == 'true' && needs.config-and-targets.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      KAGGLE_JSON: ${{ secrets.KAGGLE_JSON }}
      KAGGLE_KERNEL_ID: ${{ needs.config-and-targets.outputs.kernel_id }}
      KAGGLE_KERNEL_TITLE: ${{ vars.KAGGLE_KERNEL_TITLE }}
      LOTO_TRAIN_PRESET: ${{ needs.config-and-targets.outputs.train_preset }}
      TARGETS_CSV: ${{ needs.config-and-targets.outputs.targets_csv }}
      KAGGLE_STATUS_TIMEOUT_SECONDS: "7200"
      KAGGLE_STATUS_POLL_SECONDS: "30"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Kaggle CLI
        run: python -m pip install --upgrade pip kaggle

      - name: Configure Kaggle credentials
        shell: bash
        run: |
          mkdir -p ~/.kaggle
          printf '%s' "$KAGGLE_JSON" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Prepare kernel build directory
        shell: bash
        run: |
          IFS=',' read -r -a targets <<< "$TARGETS_CSV"
          title_args=()
          if [[ -n "$KAGGLE_KERNEL_TITLE" ]]; then
            title_args+=(--kernel-title "$KAGGLE_KERNEL_TITLE")
          fi

          python scripts/kaggle_prepare_kernel_dir.py \
            --repo-root . \
            --build-dir "$RUNNER_TEMP/kaggle-kernel" \
            --kernel-id "$KAGGLE_KERNEL_ID" \
            --train-preset "$LOTO_TRAIN_PRESET" \
            --skip-legacy-holdout \
            --targets "${targets[@]}" \
            "${title_args[@]}"

      - name: Debug build directory
        shell: bash
        run: |
          echo "kick_targets=$TARGETS_CSV"
          find "$RUNNER_TEMP/kaggle-kernel" -maxdepth 2 -type f | sort
          echo "script.py size_bytes=$(wc -c < "$RUNNER_TEMP/kaggle-kernel/script.py")"
          echo "run_config.json"
          cat "$RUNNER_TEMP/kaggle-kernel/run_config.json"

      - name: Push kernel to Kaggle
        run: kaggle kernels push -p "$RUNNER_TEMP/kaggle-kernel"

      - name: Poll kernel status
        run: |
          python - <<'PY'
          import os
          import sys
          import time
          from kaggle.api.kaggle_api_extended import KaggleApi

          kernel_id = os.environ["KAGGLE_KERNEL_ID"]
          timeout_seconds = int(os.environ.get("KAGGLE_STATUS_TIMEOUT_SECONDS", "7200"))
          poll_seconds = int(os.environ.get("KAGGLE_STATUS_POLL_SECONDS", "30"))
          deadline = time.time() + timeout_seconds

          api = KaggleApi()
          api.authenticate()

          last_status = None
          success_states = {"complete"}
          failure_states = {"failed", "error", "cancelled"}

          while time.time() < deadline:
              status = str(api.kernel_status(kernel_id)).lower()
              if status != last_status:
                  print(f"kernel_status={status}", flush=True)
                  last_status = status

              if status in success_states:
                  sys.exit(0)
              if status in failure_states:
                  raise SystemExit(f"Kaggle kernel finished with status={status}")

              time.sleep(poll_seconds)

          raise SystemExit(f"Timed out waiting for Kaggle kernel: {kernel_id}")
          PY
