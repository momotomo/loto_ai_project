name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: py_compile
        shell: bash
        run: python -m py_compile $(git ls-files '*.py')

      - name: pytest
        run: pytest -q

      - name: Smoke update_system
        run: python update_system.py --loto_type loto6 --train_preset smoke --model_variant legacy --evaluation_model_variants legacy,multihot,deepsets,settransformer --saved_calibration_method none --evaluation_calibration_methods none,temperature,isotonic --skip_final_train --skip_data_refresh --seed 42

      - name: Verify archcomp preset is registered
        run: python -c "from train_prob_model import PRESET_CONFIGS; assert 'archcomp' in PRESET_CONFIGS, 'archcomp preset missing'; p=PRESET_CONFIGS['archcomp']; assert p['eval_epochs'] > 0; print('archcomp preset OK:', p)"

      - name: Verify comparison_summary module imports cleanly
        run: python -c "from comparison_summary import build_comparison_summary, COMPARISON_SUMMARY_SCHEMA_VERSION; print('comparison_summary OK, schema_version=', COMPARISON_SUMMARY_SCHEMA_VERSION)"

      - name: Verify cross_loto_summary module imports cleanly
        run: python -c "from cross_loto_summary import build_cross_loto_summary, build_recommendation, CROSS_LOTO_SUMMARY_SCHEMA_VERSION, RECOMMENDATION_SCHEMA_VERSION; print('cross_loto_summary OK, schema_version=', CROSS_LOTO_SUMMARY_SCHEMA_VERSION)"

      - name: Verify run_cross_loto CLI parses correctly
        run: python scripts/run_cross_loto.py --help > /dev/null

      - name: Verify cross_loto_report module imports cleanly
        run: python -c "from cross_loto_report import build_markdown_report, build_variant_metrics_csv, build_pairwise_comparisons_csv, build_recommendation_summary_csv, build_run_metadata, save_report_artifacts, CROSS_LOTO_REPORT_SCHEMA_VERSION; print('cross_loto_report OK, schema_version=', CROSS_LOTO_REPORT_SCHEMA_VERSION)"

      - name: Smoke cross_loto_report artifact generation
        run: |
          python -c "
          from cross_loto_summary import build_cross_loto_summary, build_recommendation
          from cross_loto_report import build_markdown_report, build_variant_metrics_csv, build_pairwise_comparisons_csv, build_recommendation_summary_csv, build_run_metadata, save_report_artifacts
          import tempfile, pathlib
          per_loto = {'loto6': {'schema_version': 1, 'loto_type': 'loto6', 'preset': 'archcomp', 'seeds': [42], 'run_count': 1, 'alpha': 0.05, 'variants': {'legacy': {'run_count': 1, 'logloss': {'mean': 0.3, 'std': 0.0, 'values': [0.3]}, 'brier': {'mean': 0.04, 'std': 0.0, 'values': [0.04]}, 'ece': {'mean': 0.01, 'std': 0.0, 'values': [0.01]}, 'calibration_recommendations': {'none': 1}, 'promote_count': 0, 'hold_count': 1}}, 'pairwise_comparisons': {}}}
          cs = build_cross_loto_summary(per_loto, ['loto6'], 'archcomp', [42])
          rec = build_recommendation(cs)
          md = build_markdown_report(cs, rec)
          assert '## Decision Rules' in md
          vm = build_variant_metrics_csv(cs)
          assert 'variant' in vm
          pw = build_pairwise_comparisons_csv(cs)
          assert 'comparison_key' in pw
          rs = build_recommendation_summary_csv(cs, rec)
          assert 'recommended_next_action' in rs
          with tempfile.TemporaryDirectory() as d:
              saved = save_report_artifacts(cs, rec, data_dir=d)
              assert len(saved) == 4
          print('cross_loto_report artifact generation OK')
          "

      - name: Smoke run_cross_loto --report_only with minimal fixtures
        run: |
          python -c "
          import json, tempfile, pathlib, subprocess, sys
          from cross_loto_summary import build_cross_loto_summary, build_recommendation
          per_loto = {'loto6': {'schema_version': 1, 'loto_type': 'loto6', 'preset': 'archcomp', 'seeds': [42], 'run_count': 1, 'alpha': 0.05, 'variants': {'legacy': {'run_count': 1, 'logloss': {'mean': 0.3, 'std': 0.0, 'values': [0.3]}, 'brier': {'mean': 0.04, 'std': 0.0, 'values': [0.04]}, 'ece': {'mean': 0.01, 'std': 0.0, 'values': [0.01]}, 'calibration_recommendations': {'none': 1}, 'promote_count': 0, 'hold_count': 1}}, 'pairwise_comparisons': {}}}
          cs = build_cross_loto_summary(per_loto, ['loto6'], 'archcomp', [42])
          rec = build_recommendation(cs)
          with tempfile.TemporaryDirectory() as d:
              dp = pathlib.Path(d)
              (dp / 'cross_loto_summary.json').write_text(json.dumps(cs))
              (dp / 'recommendation.json').write_text(json.dumps(rec))
              result = subprocess.run([sys.executable, 'scripts/run_cross_loto.py', '--report_only', '--data_dir', d], capture_output=True, text=True)
              assert result.returncode == 0, f'FAILED: {result.stderr}'
              assert (dp / 'cross_loto_report.md').exists()
              assert (dp / 'variant_metrics.csv').exists()
          print('--report_only smoke OK')
          "

      - name: Verify campaign_profiles module imports cleanly
        run: python -c "from campaign_profiles import CAMPAIGN_PROFILES, VALID_PROFILE_NAMES, get_profile, resolve_profile, CAMPAIGN_PROFILE_SCHEMA_VERSION; assert 'archcomp_lite' in CAMPAIGN_PROFILES; assert 'archcomp' in CAMPAIGN_PROFILES; assert 'archcomp_full' in CAMPAIGN_PROFILES; print('campaign_profiles OK, profiles=', VALID_PROFILE_NAMES)"

      - name: Verify campaign_manager module imports cleanly
        run: python -c "from campaign_manager import build_campaign_entry, compute_recommendation_stability, append_campaign_to_history, load_campaign_history, save_campaign_artifacts, build_diff_report, CAMPAIGN_HISTORY_SCHEMA_VERSION; print('campaign_manager OK, schema_version=', CAMPAIGN_HISTORY_SCHEMA_VERSION)"

      - name: Smoke campaign profile resolution
        run: |
          python -c "
          from campaign_profiles import get_profile, resolve_profile
          for name in ['archcomp_lite', 'archcomp', 'archcomp_full']:
              p = get_profile(name)
              assert 'preset' in p and 'seeds' in p and 'loto_types' in p
          # Override test
          p2 = resolve_profile('archcomp', {'seeds': [42]})
          assert p2['seeds'] == [42] and p2['preset'] == 'archcomp'
          print('campaign profile resolution OK')
          "

      - name: Smoke campaign artifact generation
        run: |
          python -c "
          import json, tempfile, pathlib
          from cross_loto_summary import build_cross_loto_summary, build_recommendation
          from campaign_manager import build_campaign_entry, append_campaign_to_history, compute_recommendation_stability, save_campaign_artifacts, build_diff_report
          per_loto = {'loto6': {'schema_version': 1, 'loto_type': 'loto6', 'preset': 'archcomp', 'seeds': [42], 'run_count': 1, 'alpha': 0.05, 'variants': {'legacy': {'run_count': 1, 'logloss': {'mean': 0.3, 'std': 0.0, 'values': [0.3]}, 'brier': {'mean': 0.04, 'std': 0.0, 'values': [0.04]}, 'ece': {'mean': 0.01, 'std': 0.0, 'values': [0.01]}, 'calibration_recommendations': {'none': 1}, 'promote_count': 0, 'hold_count': 1}}, 'pairwise_comparisons': {}}}
          cs = build_cross_loto_summary(per_loto, ['loto6'], 'archcomp', [42])
          rec = build_recommendation(cs)
          e1 = build_campaign_entry('c1', 'archcomp', cs, rec)
          e2 = build_campaign_entry('c2', 'archcomp', cs, rec)
          history = append_campaign_to_history([], e1)
          history = append_campaign_to_history(history, e2)
          stability = compute_recommendation_stability(history)
          assert stability['total_campaigns'] == 2
          diff_md = build_diff_report(e1, e2, stability=stability)
          assert '## Campaign Overview' in diff_md
          assert '## Recommendation Change' in diff_md
          assert '## Recommendation Stability' in diff_md
          with tempfile.TemporaryDirectory() as d:
              paths = save_campaign_artifacts(history, data_dir=d)
              assert pathlib.Path(paths['campaign_history.json']).exists()
              assert pathlib.Path(paths['campaign_history.csv']).exists()
              assert pathlib.Path(paths['campaign_diff_report.md']).exists()
          print('campaign artifact generation OK')
          "

      - name: Smoke run_campaign --list_profiles
        run: python scripts/run_campaign.py --list_profiles

      - name: Verify run_campaign CLI help
        run: python scripts/run_campaign.py --help > /dev/null

      - name: Verify governance_layer module imports cleanly
        run: python -c "from governance_layer import build_trend_summary, build_regression_alert, build_promotion_gate, build_governance_report, save_governance_artifacts, TREND_SUMMARY_SCHEMA_VERSION, REGRESSION_ALERT_SCHEMA_VERSION, PROMOTION_GATE_SCHEMA_VERSION, GOVERNANCE_REPORT_SCHEMA_VERSION; print('governance_layer OK, schema_versions=', TREND_SUMMARY_SCHEMA_VERSION, REGRESSION_ALERT_SCHEMA_VERSION, PROMOTION_GATE_SCHEMA_VERSION, GOVERNANCE_REPORT_SCHEMA_VERSION)"

      - name: Verify stability extension has new keys
        run: |
          python -c "
          from campaign_manager import compute_recommendation_stability
          s = compute_recommendation_stability([])
          assert 'consecutive_positive_signal_for_settransformer' in s, 'Missing settransformer key'
          assert 'consecutive_positive_signal_for_deepsets' in s, 'Missing deepsets key'
          assert 'consecutive_same_action_accepted_only' in s, 'Missing accepted_only action key'
          assert 'consecutive_positive_signal_for_settransformer_accepted_only' in s, 'Missing accepted_only st key'
          assert 'total_accepted_campaigns' in s, 'Missing total_accepted_campaigns'
          print('stability extension OK:', list(s.keys()))
          "

      - name: Smoke governance artifact generation
        run: |
          python -c "
          import json, tempfile, pathlib
          from cross_loto_summary import build_cross_loto_summary, build_recommendation
          from campaign_manager import build_campaign_entry, append_campaign_to_history, compute_recommendation_stability
          from governance_layer import save_governance_artifacts, build_trend_summary, build_regression_alert, build_promotion_gate, build_governance_report
          per_loto = {'loto6': {'schema_version': 1, 'loto_type': 'loto6', 'preset': 'archcomp', 'seeds': [42], 'run_count': 1, 'alpha': 0.05, 'variants': {'legacy': {'run_count': 1, 'logloss': {'mean': 0.3, 'std': 0.0, 'values': [0.3]}, 'brier': {'mean': 0.04, 'std': 0.0, 'values': [0.04]}, 'ece': {'mean': 0.01, 'std': 0.0, 'values': [0.01]}, 'calibration_recommendations': {'none': 1}, 'promote_count': 0, 'hold_count': 1}}, 'pairwise_comparisons': {}}}
          cs = build_cross_loto_summary(per_loto, ['loto6'], 'archcomp', [42])
          rec = build_recommendation(cs)
          e1 = build_campaign_entry('c1', 'archcomp', cs, rec)
          e2 = build_campaign_entry('c2', 'archcomp', cs, rec)
          history = append_campaign_to_history([], e1)
          history = append_campaign_to_history(history, e2)
          stability = compute_recommendation_stability(history)
          assert 'consecutive_positive_signal_for_settransformer' in stability
          trend = build_trend_summary(history)
          assert 'schema_version' in trend and 'variant_rank_history' in trend
          alert = build_regression_alert(history)
          assert 'alert_level' in alert and alert['alert_level'] in ('none', 'low', 'medium', 'high')
          gate = build_promotion_gate(history, stability, regression_alert=alert)
          assert 'gate_status' in gate and gate['gate_status'] in ('red', 'yellow', 'green')
          gov_md = build_governance_report(trend, alert, gate, stability, latest_entry=e2)
          assert '# Governance Report' in gov_md
          assert '## Promotion Readiness Gate' in gov_md
          with tempfile.TemporaryDirectory() as d:
              paths = save_governance_artifacts(history, stability, data_dir=d)
              expected = [
                  'trend_summary.json', 'trend_summary.md',
                  'regression_alert.json', 'regression_alert.md',
                  'promotion_gate.json', 'promotion_gate.md',
                  'governance_report.md',
                  'comparability_report.json', 'comparability_report.md',
                  'benchmark_lock.json', 'benchmark_lock.md',
                  'campaign_acceptance.json', 'campaign_acceptance.md',
                  'accepted_campaign_summary.json', 'accepted_campaign_summary.md',
                  'promotion_review_readiness.json', 'promotion_review_readiness.md',
                  'accepted_campaign_review_bundle.json', 'accepted_campaign_review_bundle.md',
              ]
              for name in expected:
                  assert name in paths, f'Missing: {name}'
                  assert pathlib.Path(paths[name]).exists(), f'File missing: {name}'
              assert len(paths) == 19, f'Expected 19 artifacts, got {len(paths)}'
          print('governance artifact generation OK')
          "

      - name: Verify decision_policy module imports cleanly
        run: python -c "from decision_policy import DECISION_BENCHMARK_POLICY, DECISION_POLICY_SCHEMA_VERSION, CAMPAIGN_ACCEPTANCE_SCHEMA_VERSION, build_benchmark_lock_artifact, check_campaign_acceptance, save_benchmark_lock_artifacts, save_campaign_acceptance_artifacts; assert 'archcomp' in DECISION_BENCHMARK_POLICY['active_decision_benchmarks']; assert 'archcomp_lite' in DECISION_BENCHMARK_POLICY['excluded_profiles']; print('decision_policy OK, schema_version=', DECISION_POLICY_SCHEMA_VERSION)"

      - name: Smoke decision benchmark policy and acceptance
        run: |
          python -c "
          import json, tempfile, pathlib
          from decision_policy import build_benchmark_lock_artifact, build_benchmark_lock_md, check_campaign_acceptance, build_campaign_acceptance_md, save_benchmark_lock_artifacts, save_campaign_acceptance_artifacts, DECISION_BENCHMARK_POLICY
          from cross_loto_summary import build_cross_loto_summary, build_recommendation
          from campaign_manager import build_campaign_entry

          # Test benchmark lock artifact
          lock = build_benchmark_lock_artifact()
          assert 'schema_version' in lock
          assert 'active_decision_benchmarks' in lock
          assert 'archcomp' in lock['active_decision_benchmarks']
          assert 'archcomp_lite' in lock['excluded_profiles']
          md = build_benchmark_lock_md(lock)
          assert 'Decision Benchmark Policy' in md

          # Test campaign acceptance for archcomp (should be accepted)
          per_loto = {'loto6': {'schema_version': 1, 'loto_type': 'loto6', 'preset': 'archcomp', 'seeds': [42, 123, 456], 'run_count': 3, 'alpha': 0.05, 'variants': {'legacy': {'run_count': 3, 'logloss': {'mean': 0.3, 'std': 0.0, 'values': [0.3, 0.3, 0.3]}, 'brier': {'mean': 0.04, 'std': 0.0, 'values': [0.04, 0.04, 0.04]}, 'ece': {'mean': 0.01, 'std': 0.0, 'values': [0.01, 0.01, 0.01]}, 'calibration_recommendations': {'none': 3}, 'promote_count': 0, 'hold_count': 3}}, 'pairwise_comparisons': {}}, 'loto7': {'schema_version': 1, 'loto_type': 'loto7', 'preset': 'archcomp', 'seeds': [42, 123, 456], 'run_count': 3, 'alpha': 0.05, 'variants': {'legacy': {'run_count': 3, 'logloss': {'mean': 0.3, 'std': 0.0, 'values': [0.3, 0.3, 0.3]}, 'brier': {'mean': 0.04, 'std': 0.0, 'values': [0.04, 0.04, 0.04]}, 'ece': {'mean': 0.01, 'std': 0.0, 'values': [0.01, 0.01, 0.01]}, 'calibration_recommendations': {'none': 3}, 'promote_count': 0, 'hold_count': 3}}, 'pairwise_comparisons': {}}, 'miniloto': {'schema_version': 1, 'loto_type': 'miniloto', 'preset': 'archcomp', 'seeds': [42, 123, 456], 'run_count': 3, 'alpha': 0.05, 'variants': {'legacy': {'run_count': 3, 'logloss': {'mean': 0.3, 'std': 0.0, 'values': [0.3, 0.3, 0.3]}, 'brier': {'mean': 0.04, 'std': 0.0, 'values': [0.04, 0.04, 0.04]}, 'ece': {'mean': 0.01, 'std': 0.0, 'values': [0.01, 0.01, 0.01]}, 'calibration_recommendations': {'none': 3}, 'promote_count': 0, 'hold_count': 3}}, 'pairwise_comparisons': {}}}
          cs = build_cross_loto_summary(per_loto, ['loto6', 'loto7', 'miniloto'], 'archcomp', [42, 123, 456])
          rec = build_recommendation(cs)
          entry = build_campaign_entry('ci_test', 'archcomp', cs, rec, evaluation_model_variants='legacy,multihot,deepsets,settransformer', evaluation_calibration_methods='none,temperature,isotonic')
          result = check_campaign_acceptance(entry, comparability_ok=True)
          assert result['accepted_for_decision_use'] is True, f'Expected accepted, got: {result}'
          assert result['failed_requirements'] == []

          # Test archcomp_lite rejection
          per_loto_lite = {'loto6': per_loto['loto6']}
          cs_lite = build_cross_loto_summary(per_loto_lite, ['loto6'], 'fast', [42, 123])
          entry_lite = build_campaign_entry('ci_lite', 'archcomp_lite', cs_lite, rec, evaluation_model_variants='legacy,multihot,deepsets,settransformer', evaluation_calibration_methods='none,temperature,isotonic')
          result_lite = check_campaign_acceptance(entry_lite, comparability_ok=True)
          assert result_lite['accepted_for_decision_use'] is False, f'Expected not accepted, got: {result_lite}'

          # Test save artifacts
          with tempfile.TemporaryDirectory() as d:
              lock_paths = save_benchmark_lock_artifacts(data_dir=d)
              assert 'benchmark_lock.json' in lock_paths
              assert 'benchmark_lock.md' in lock_paths
              acc_paths = save_campaign_acceptance_artifacts(entry, data_dir=d, comparability_ok=True)
              assert 'campaign_acceptance.json' in acc_paths
              data = json.loads(pathlib.Path(acc_paths['campaign_acceptance.json']).read_text())
              assert data['accepted_for_decision_use'] is True
          print('decision policy and acceptance smoke OK')
          "

      - name: Verify benchmark_registry module imports cleanly
        run: python -c "from benchmark_registry import BENCHMARK_DEFINITIONS, BENCHMARK_REGISTRY_SCHEMA_VERSION, VALID_BENCHMARK_NAMES, resolve_benchmark_for_profile, get_benchmark, benchmarks_are_compatible; assert 'archcomp' in BENCHMARK_DEFINITIONS; assert 'archcomp_lite' in BENCHMARK_DEFINITIONS; assert 'archcomp_full' in BENCHMARK_DEFINITIONS; print('benchmark_registry OK, benchmarks=', VALID_BENCHMARK_NAMES)"

      - name: Verify comparability_checker module imports cleanly
        run: python -c "from comparability_checker import check_pair_comparability, check_history_comparability, save_comparability_artifacts, COMPARABILITY_SCHEMA_VERSION; print('comparability_checker OK, schema_version=', COMPARABILITY_SCHEMA_VERSION)"

      - name: Smoke benchmark registry resolution
        run: |
          python -c "
          from benchmark_registry import resolve_benchmark_for_profile, get_benchmark, benchmarks_are_compatible, validate_campaign_against_benchmark
          assert resolve_benchmark_for_profile('archcomp') == 'archcomp'
          assert resolve_benchmark_for_profile('archcomp_lite') == 'archcomp_lite'
          assert resolve_benchmark_for_profile('archcomp_full') == 'archcomp_full'
          assert resolve_benchmark_for_profile('unknown_profile') == 'unknown_profile'
          assert benchmarks_are_compatible('archcomp', 'archcomp')
          assert benchmarks_are_compatible('archcomp', 'archcomp_full')
          assert benchmarks_are_compatible('archcomp_full', 'archcomp')
          assert not benchmarks_are_compatible('archcomp_lite', 'archcomp')
          b = get_benchmark('archcomp')
          assert b['min_seed_count'] == 3
          assert b['expected_loto_types'] == ['loto6', 'loto7', 'miniloto']
          print('benchmark registry resolution OK')
          "

      - name: Smoke comparability artifact generation
        run: |
          python -c "
          import json, tempfile, pathlib
          from cross_loto_summary import build_cross_loto_summary, build_recommendation
          from campaign_manager import build_campaign_entry, append_campaign_to_history
          from comparability_checker import check_pair_comparability, check_history_comparability, save_comparability_artifacts, build_comparability_report_md
          per_loto = {'loto6': {'schema_version': 1, 'loto_type': 'loto6', 'preset': 'archcomp', 'seeds': [42, 123, 456], 'run_count': 3, 'alpha': 0.05, 'variants': {'legacy': {'run_count': 3, 'logloss': {'mean': 0.3, 'std': 0.0, 'values': [0.3, 0.3, 0.3]}, 'brier': {'mean': 0.04, 'std': 0.0, 'values': [0.04, 0.04, 0.04]}, 'ece': {'mean': 0.01, 'std': 0.0, 'values': [0.01, 0.01, 0.01]}, 'calibration_recommendations': {'none': 3}, 'promote_count': 0, 'hold_count': 3}}, 'pairwise_comparisons': {}}}
          cs = build_cross_loto_summary(per_loto, ['loto6'], 'archcomp', [42, 123, 456])
          rec = build_recommendation(cs)
          e1 = build_campaign_entry('c1', 'archcomp', cs, rec, evaluation_model_variants='legacy,multihot,deepsets,settransformer', evaluation_calibration_methods='none,temperature,isotonic')
          e2 = build_campaign_entry('c2', 'archcomp', cs, rec, evaluation_model_variants='legacy,multihot,deepsets,settransformer', evaluation_calibration_methods='none,temperature,isotonic')
          assert e1['benchmark_name'] == 'archcomp', f'expected archcomp, got {e1[\"benchmark_name\"]}'
          pair = check_pair_comparability(e1, e2)
          assert 'comparable' in pair and 'severity' in pair and 'failed_checks' in pair
          history = append_campaign_to_history([], e1)
          history = append_campaign_to_history(history, e2)
          hist_result = check_history_comparability(history)
          assert 'overall_comparable' in hist_result
          md = build_comparability_report_md(hist_result)
          assert '# Comparability Report' in md
          with tempfile.TemporaryDirectory() as d:
              paths = save_comparability_artifacts(history, data_dir=d)
              assert 'comparability_report.json' in paths
              assert 'comparability_report.md' in paths
              data = json.loads(pathlib.Path(paths['comparability_report.json']).read_text())
              assert 'overall_comparable' in data
          print('comparability artifact generation OK')
          "

      - name: Verify promotion_review module imports cleanly
        run: python -c "from promotion_review import build_accepted_campaign_summary, build_promotion_review_readiness, build_accepted_campaign_review_bundle, save_accepted_campaign_summary_artifacts, save_promotion_review_readiness_artifacts, save_accepted_campaign_review_bundle_artifacts, ACCEPTED_CAMPAIGN_SUMMARY_SCHEMA_VERSION, PROMOTION_REVIEW_READINESS_SCHEMA_VERSION, ACCEPTED_REVIEW_BUNDLE_SCHEMA_VERSION; assert ACCEPTED_CAMPAIGN_SUMMARY_SCHEMA_VERSION == 1; assert PROMOTION_REVIEW_READINESS_SCHEMA_VERSION == 1; assert ACCEPTED_REVIEW_BUNDLE_SCHEMA_VERSION == 1; print('promotion_review OK')"

      - name: Smoke promotion review bundle generation
        run: |
          python -c "
          import json, tempfile, pathlib
          from cross_loto_summary import build_cross_loto_summary, build_recommendation
          from campaign_manager import build_campaign_entry, append_campaign_to_history, compute_recommendation_stability
          from promotion_review import build_accepted_campaign_summary, build_promotion_review_readiness, build_accepted_campaign_review_bundle, save_accepted_campaign_summary_artifacts, save_promotion_review_readiness_artifacts, save_accepted_campaign_review_bundle_artifacts
